apiVersion: apps/v1
kind: Deployment
metadata:
  name: primetrade-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: primetrade-frontend
          image: kshitijrajgude/primetrade-assignment-frontend-alpine:latest
          envFrom:
            - secretRef:
                name: primetrade-frontend-secrets
          ports:
            - containerPort: 5173
          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 15
            periodSeconds: 10
